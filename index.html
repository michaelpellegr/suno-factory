<!DOCTYPE html>
<html>
<head>
    <title>Suno Factory</title>
</head>
<body>

<h1>Suno Factory</h1>

<label>Genre</label>
<select>
    <option>House</option>
    <option>Alternative Rock</option>
    <option>Trap</option>
</select>

<br><br>

<label>Mood</label>
<select>
    <option>Happy</option>
    <option>Sad</option>
    <option>Dark</option>
</select>

<br><br>

<label>Theme</label>
<input type="text" placeholder="Toxic Love">

<br><br>

<button>Generate Song</button>

<h2>Style Output</h2>

<h2>Lyrics Output</h2>
<textarea rows="20" cols="80"></textarea>

<textarea rows="5" cols="80"></textarea>

</html>


<select id="genre">
    <option>House</option>
    <option>Alternative Rock</option>
</select>

<select id="mood">

</select>

<input id="theme" type="text">

<button id="generateBtn">
    Generate Song
</button>

<textarea id="styleOutput"></textarea>
<textarea id="lyricsOutput"></textarea>
