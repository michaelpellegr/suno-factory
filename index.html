<!DOCTYPE html>
<html>
<head>
    <title>Suno Factory</title>
</head>
<body>

<h1>Suno Factory</h1>

<label>Genre</label>
<select id="genre">
    <option>House</option>
    <option>Alternative Rock</option>
    <option>Trap</option>
</select>

<br><br>

<label>Mood</label>
<select id="mood">
    <option>Happy</option>
    <option>Sad</option>
    <option>Dark</option>
</select>

<br><br>

<label>Theme</label>
<input id="theme" type="text" placeholder="Toxic Love">

<br><br>

<button id="generateBtn">Generate Song</button>

<hr>

<h2>Style Output</h2>
<textarea id="styleOutput" rows="10" cols="80"></textarea>

<h2>Lyrics Output</h2>
<textarea id="lyricsOutput" rows="20" cols="80"></textarea>

<h2>Settings</h2>
<textarea id="settingsOutput" rows="5" cols="80"></textarea>

<script src="script.js"></script>

</body>
</html>
